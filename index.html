<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description"
    content="Premium smart-home lighting control for permanent roofline LED systems. Control, schedule, and customize your home lighting effortlessly." />
  <title>Lighting by LeafFilter™ — Smart Roofline Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/lf-logo.svg" />
</head>

<body>
  <!-- Desktop: centered mobile frame. Mobile: full screen -->
  <div id="app-frame">
    <div id="app-container">
      <!-- Status bar (simulated) -->
      <div id="status-bar">
        <span class="status-time" id="status-time">9:41</span>
        <div class="status-icons">
          <!-- Wi-Fi -->
          <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor">
            <path d="M1 4.5C3.3 1.8 6.5 0 8 0s4.7 1.8 7 4.5L8 12 1 4.5z" opacity="0.3" />
            <path d="M3.5 6.5C5 4.8 6.5 3.5 8 3.5s3 1.3 4.5 3L8 12 3.5 6.5z" opacity="0.6" />
            <path d="M5.5 8.5C6.5 7.2 7.2 6.5 8 6.5s1.5.7 2.5 2L8 12 5.5 8.5z" />
          </svg>
          <!-- Battery -->
          <svg width="18" height="10" viewBox="0 0 18 10" fill="currentColor">
            <rect x="0" y="1" width="14" height="8" rx="1.5" stroke="currentColor" fill="none" stroke-width="1" />
            <rect x="1.5" y="2.5" width="10" height="5" rx="0.5" />
            <path d="M15 3.5v3a1.5 1.5 0 000-3z" />
          </svg>
        </div>
      </div>

      <!-- Screen content area -->
      <main id="screen-content"></main>

      <!-- Bottom Navigation -->
      <nav id="bottom-nav">
        <button class="nav-item active" data-screen="home" id="nav-home">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
          <span>Home</span>
        </button>
        <button class="nav-item" data-screen="scenes" id="nav-scenes">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5" />
            <path
              d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
          </svg>
          <span>Patterns</span>
        </button>
        <!-- Center FAB: Control -->
        <button class="nav-item nav-fab" data-screen="control" id="nav-control">
          <div class="nav-fab-ring"></div>
          <svg class="nav-fab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round">
            <path d="M18.36 6.64a9 9 0 11-12.73 0" />
            <line x1="12" y1="2" x2="12" y2="12" />
          </svg>
        </button>
        <button class="nav-item" data-screen="schedule" id="nav-schedule">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
          </svg>
          <span>Schedule</span>
        </button>
        <button class="nav-item" data-screen="support" id="nav-support">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3" />
            <line x1="12" y1="17" x2="12.01" y2="17" />
          </svg>
          <span>Support</span>
        </button>
      </nav>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
